document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e ship faster with agentic coding<\u002Fdiv>\n    <h1 style=\"font-size:var(--hero);font-weight:600;line-height:0.98;letter-spacing:-0.02em;max-width:22ch;\">Building with kiro‑cli<\u002Fh1>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);font-weight:400;margin-top:44px;max-width:44ch;line-height:1.28;\">The problems we hit running a multi-repo AWS platform — and how agentic coding solved each one.<\u002Fp>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--body);color:var(--cream);margin-top:64px;display:flex;align-items:center;gap:2px;\">\n      <span style=\"color:var(--sage);\">$<\u002Fspan>&nbsp;kiro<span style=\"display:inline-block;width:16px;height:34px;background:var(--clay);margin-left:10px;animation:caretBlink 1.1s step-end infinite;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:absolute;left:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">POWERPIPE-DASHBOARD · TEAM WALKTHROUGH<\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">01<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"The platform\" data-screen-label=\"The platform\" data-speaker-notes=\"Set the scale of what we operate. This isn't a toy project — it's four repos, nine accounts, real FinOps and drift detection, serving live dashboards on EKS. Every one of these surfaces its own conventions and failure modes.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">What we run<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:22ch;margin-bottom:56px;\">powerpipe-dashboard<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:28px;max-width:1660px;\">\n      <div style=\"border-top:2px solid var(--clay);padding-top:24px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:52px;color:var(--ink);font-weight:500;line-height:1;\">4<\u002Fdiv><p style=\"font-size:var(--small);line-height:1.3;margin-top:14px;\">repositories, one platform<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:24px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:52px;color:var(--ink);font-weight:500;line-height:1;\">9<\u002Fdiv><p style=\"font-size:var(--small);line-height:1.3;margin-top:14px;\">AWS accounts scanned<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:24px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:52px;color:var(--ink);font-weight:500;line-height:1;\">$<\u002Fdiv><p style=\"font-size:var(--small);line-height:1.3;margin-top:14px;\">FinOps cost reports<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:24px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:52px;color:var(--ink);font-weight:500;line-height:1;\">≠<\u002Fdiv><p style=\"font-size:var(--small);line-height:1.3;margin-top:14px;\">infrastructure drift detection<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:24px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:52px;color:var(--ink);font-weight:500;line-height:1;\">⎈<\u002Fdiv><p style=\"font-size:var(--small);line-height:1.3;margin-top:14px;\">interactive dashboards on EKS<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">02<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"The challenge\" data-screen-label=\"The challenge\" data-speaker-notes=\"This is the reframed 'the challenge' section. The point: the conventions, security rules, deployment patterns and ops procedures are more than any of us can hold in our heads at once. Every context switch loses knowledge; every new session starts from zero. That's the gap we needed to close.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">The challenge<\u002Fdiv>\n    <h2 style=\"font-size:80px;font-weight:600;line-height:1.03;letter-spacing:-0.02em;max-width:24ch;\">More context than anyone can hold in their head.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:44px;max-width:52ch;line-height:1.3;\">Branch conventions, Vault auth, Kyverno policies, deploy patterns, verification steps — spread across four repos. Every context switch loses knowledge. Every new session starts from zero.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">03<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"The solution\" data-screen-label=\"The solution\" data-speaker-notes=\"Kiro-cli as a persistent, context-aware development partner — not autocomplete. The rest of the deck walks these eight building blocks in order, each one a problem we had and how we solved it.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">The solution<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:24ch;margin-bottom:20px;\">A development partner with memory and guardrails<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:8px;margin-bottom:52px;max-width:50ch;line-height:1.3;\">Eight building blocks we configured. We'll walk each as a problem and its fix.<\u002Fp>\n    <div style=\"display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:20px;\">\n      <span style=\"padding:12px 22px;border:1px solid var(--clay);border-radius:100px;color:var(--clay);\">01 steering<\u002Fspan>\n      <span style=\"padding:12px 22px;border:1px solid var(--line-cream);border-radius:100px;\">02 skills<\u002Fspan>\n      <span style=\"padding:12px 22px;border:1px solid var(--line-cream);border-radius:100px;\">03 agents<\u002Fspan>\n      <span style=\"padding:12px 22px;border:1px solid var(--line-cream);border-radius:100px;\">04 hooks<\u002Fspan>\n      <span style=\"padding:12px 22px;border:1px solid var(--line-cream);border-radius:100px;\">05 permissions<\u002Fspan>\n      <span style=\"padding:12px 22px;border:1px solid var(--line-cream);border-radius:100px;\">06 context<\u002Fspan>\n      <span style=\"padding:12px 22px;border:1px solid var(--line-cream);border-radius:100px;\">07 workflow<\u002Fspan>\n      <span style=\"padding:12px 22px;border:1px solid var(--line-cream);border-radius:100px;\">08 automation<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">04<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"I · Steering — divider\" data-screen-label=\"Steering\" data-speaker-notes=\"Section I. The problem: every new session, the AI had no idea about our branch naming, Vault auth, Kyverno labels, or that pushing to main is forbidden. So it suggested wrong patterns constantly. Steering is how we inject project DNA into every session.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">I · Steering<\u002Fdiv>\n    <h2 style=\"font-size:88px;font-weight:600;line-height:1.02;letter-spacing:-0.02em;max-width:20ch;\">Inject project DNA into every session.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:48px;max-width:48ch;line-height:1.3;\"><span style=\"color:var(--clay);font-family:'JetBrains Mono',monospace;font-size:var(--small);\">PROBLEM&nbsp;→&nbsp;<\u002Fspan>Without our rules, the agent used <span style=\"font-family:'JetBrains Mono',monospace;font-size:30px;\">git push origin main<\u002Fspan>, forgot security constraints, and generated manifests Kyverno rejects.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">05<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Steering files\" data-screen-label=\"Steering files\" data-speaker-notes=\"The fix: markdown documents in .kiro/steering/ that load automatically into every session's context. They act as persistent project rules the agent follows without being reminded. We built 14 of them covering architecture, onboarding, IaC conventions, CI, GitOps, secrets, and hard-won deployment lessons.\" style=\"background:var(--paper);color:var(--ink);display:flex;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding-right:56px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">I · Steering · the fix<\u002Fdiv>\n      <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:16ch;margin-bottom:36px;\">Rules that load themselves<\u002Fh2>\n      <ul style=\"display:flex;flex-direction:column;gap:22px;font-size:var(--body);line-height:1.3;max-width:32ch;\">\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:var(--clay);\">→<\u002Fspan><span>Markdown in <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;\">.kiro/steering/<\u002Fspan>, injected into <strong>every<\u002Fstrong> session.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:var(--clay);\">→<\u002Fspan><span>Followed without being reminded — no re-prompting.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:var(--clay);\">→<\u002Fspan><span>14 files covering architecture, IaC, CI, GitOps, secrets.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"width:740px;display:flex;align-items:center;\">\n      <div style=\"width:100%;background:var(--ink);border-radius:10px;overflow:hidden;box-shadow:0 24px 60px rgba(27,24,19,0.22);\">\n        <div style=\"display:flex;align-items:center;gap:9px;padding:16px 22px;border-bottom:1px solid var(--line-cream);\">\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#E06C5A;\"><\u002Fspan>\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#E3B341;\"><\u002Fspan>\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#7E9A66;\"><\u002Fspan>\n          <span style=\"margin-left:14px;font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--muted-cream);\">.kiro/steering/<\u002Fspan>\n        <\u002Fdiv>\n        <pre style=\"margin:0;padding:28px 34px;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.62;color:var(--cream);white-space:pre-wrap;\">project-structure.md      <span style=\"color:var(--muted-cream);\"># repos, data flow<\u002Fspan>\nkyverno-policies.md       <span style=\"color:var(--muted-cream);\"># K8s admission rules<\u002Fspan>\nterraform-conventions.md  <span style=\"color:var(--muted-cream);\"># naming, tagging<\u002Fspan>\nterragrunt-conventions.md <span style=\"color:var(--muted-cream);\"># DRY IaC layout<\u002Fspan>\ngitlab-ci-conventions.md  <span style=\"color:var(--muted-cream);\"># Vault auth, stages<\u002Fspan>\ngitops-workflow.md        <span style=\"color:var(--muted-cream);\"># branch + MR flow<\u002Fspan>\nsecrets-handling.md       <span style=\"color:var(--muted-cream);\"># Vault-only, masked<\u002Fspan>\ndevelopment-workflow.md    <span style=\"color:var(--muted-cream);\"># human gates<\u002Fspan>\npowerpipe-verification.md <span style=\"color:var(--clay);\"># run dashboard list<\u002Fspan>\npilot-deployment-lessons.md <span style=\"color:var(--muted-cream);\"># hard-won<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">06<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Kyverno example\" data-screen-label=\"Kyverno example\" data-speaker-notes=\"Concrete example. Kyverno requires mandatory labels and non-root security context on every K8s resource. Without steering the agent omits them, Kyverno rejects the deployment, and we debug for 20 minutes. With steering it includes mandatoryLabels and runAsUser 1000 automatically, every time. Outcome: zero Kyverno rejections since we added the file.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">I · Steering · in practice<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:24ch;margin-bottom:48px;\">Kyverno policies, enforced silently<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:46px;max-width:1560px;\">\n      <div style=\"padding:38px 42px;border:1px solid var(--line-ink);border-radius:6px;background:var(--paper2);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--small);color:var(--muted-ink);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:22px;\">Without steering<\u002Fdiv>\n        <p style=\"font-size:27px;line-height:1.34;\">Deployment ships without labels → Kyverno rejects it → we debug for <strong>20 minutes<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:38px 42px;border:1px solid var(--sage);border-radius:6px;background:#fff;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--small);color:var(--sage);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:22px;\">With steering<\u002Fdiv>\n        <p style=\"font-size:27px;line-height:1.34;\">Mandatory labels and <span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;\">runAsUser: 1000<\u002Fspan> included automatically — every time.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:56px;margin-top:44px;font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--ink);flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"color:var(--sage);\">✓<\u002Fspan> Zero Kyverno rejections since<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"color:var(--sage);\">✓<\u002Fspan> Consistent branch naming<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"color:var(--sage);\">✓<\u002Fspan> No accidental pushes to main<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">07<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"II · Skills — divider\" data-screen-label=\"Skills\" data-speaker-notes=\"Section II. The problem: kiro had no knowledge of Powerpipe HCL syntax, Steampipe's embedded Postgres mode, our CI architecture, or our FinOps cost formulas. It would hallucinate HCL and break pipelines. Skills teach it what it doesn't know.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">II · Skills<\u002Fdiv>\n    <h2 style=\"font-size:88px;font-weight:600;line-height:1.02;letter-spacing:-0.02em;max-width:20ch;\">Teach kiro what it doesn't know.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:48px;max-width:50ch;line-height:1.3;\"><span style=\"color:var(--clay);font-family:'JetBrains Mono',monospace;font-size:var(--small);\">PROBLEM&nbsp;→&nbsp;<\u002Fspan>Powerpipe HCL, Steampipe's Postgres mode, our CI architecture, FinOps formulas — all niche. Left alone, the model hallucinated them.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">08<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Skills tree\" data-screen-label=\"Skills tree\" data-speaker-notes=\"The fix: skills are structured knowledge packages with YAML frontmatter that tells kiro WHEN to load them — on demand, not always like steering. Each has a description trigger plus reference docs, assets, and scripts. We built skills for powerpipe, steampipe, finops, terraform, AWS architecture, security review, and CI.\" style=\"background:var(--paper);color:var(--ink);display:flex;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding-right:56px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">II · Skills · the fix<\u002Fdiv>\n      <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:15ch;margin-bottom:34px;\">Knowledge loaded on demand<\u002Fh2>\n      <p style=\"font-size:var(--body);line-height:1.34;max-width:30ch;margin-bottom:24px;\">YAML frontmatter tells kiro <em>when<\u002Fem> to load each skill — not always, only when relevant.<\u002Fp>\n      <p style=\"font-size:var(--small);color:var(--muted-ink);line-height:1.36;max-width:32ch;\">Each carries reference docs, starter assets, and scripts. A mention of <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;\">.pp<\u002Fspan> files pulls in the powerpipe skill.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"width:720px;display:flex;align-items:center;\">\n      <div style=\"width:100%;background:var(--ink);border-radius:10px;overflow:hidden;box-shadow:0 24px 60px rgba(27,24,19,0.22);\">\n        <div style=\"display:flex;align-items:center;gap:9px;padding:16px 22px;border-bottom:1px solid var(--line-cream);\">\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#E06C5A;\"><\u002Fspan>\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#E3B341;\"><\u002Fspan>\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#7E9A66;\"><\u002Fspan>\n          <span style=\"margin-left:14px;font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--muted-cream);\">.kiro/skills/<\u002Fspan>\n        <\u002Fdiv>\n        <pre style=\"margin:0;padding:28px 34px;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.64;color:var(--cream);white-space:pre-wrap;\"><span style=\"color:var(--clay);\">powerpipe/<\u002Fspan>        HCL, SQL, graphs, troubleshoot\n<span style=\"color:var(--clay);\">steampipe/<\u002Fspan>        scans, DB lifecycle, queries\nfinops-cost-scan/  cost scan automation\nterraform-aws/     modules, references, scripts\naws-solution-arch/ architecture references\nsecurity-reviewer/ review checklist\ngitlab-pipeline/   CI architecture<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">09<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Before/after HCL\" data-screen-label=\"Before/after HCL\" data-speaker-notes=\"The killer example. Ask for a card counting EC2 instances. Before skills, the AI queries the live aws_ec2_instance table — wrong, our architecture uses pre-computed tables. After skills, it writes a named query starting from local.all_resources_cte, the pattern we actually use. Correct HCL on the first attempt, every time.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:24px;\">II · Skills · in practice<\u002Fdiv>\n    <h2 style=\"font-size:52px;font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:34ch;margin-bottom:14px;\">“Create a card showing total EC2 instances”<\u002Fh2>\n    <p style=\"font-size:var(--small);color:var(--muted-ink);margin-bottom:40px;\">Same prompt, before and after the powerpipe skill.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1640px;\">\n      <div style=\"border-radius:8px;overflow:hidden;border:1px solid var(--line-ink);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.1em;color:var(--muted-ink);padding:14px 24px;background:var(--paper2);border-bottom:1px solid var(--line-ink);\">BEFORE — hallucinated<\u002Fdiv>\n        <pre style=\"margin:0;padding:26px 28px;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.6;color:var(--ink);background:#fff;white-space:pre-wrap;\">card {\n  sql = \"SELECT count(*)\n    FROM aws_ec2_instance\"\n}\n<span style=\"color:var(--clay);\">✗ live table, not pre-computed<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border-radius:8px;overflow:hidden;border:1px solid var(--sage);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.1em;color:var(--sage);padding:14px 24px;background:#fff;border-bottom:1px solid var(--sage);\">AFTER — correct pattern<\u002Fdiv>\n        <pre style=\"margin:0;padding:26px 28px;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.6;color:var(--ink);background:#fff;white-space:pre-wrap;\">query \"card_total_ec2\" {\n  sql = &lt;&lt;-EOQ\n    ${local.all_resources_cte}\n    select count(*) as value\n    from all_resources\n    where service = 'EC2'\n  EOQ\n}\n<span style=\"color:var(--sage);\">✓ pre-computed CTE, named query<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">10<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"III · Agents — divider\" data-screen-label=\"Agents\" data-speaker-notes=\"Section III. The problem with one general-purpose agent: context pollution, wrong tools available, no specialisation, and permission sprawl — every agent could modify any file and run any command. The fix is purpose-built agents.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">III · Agents<\u002Fdiv>\n    <h2 style=\"font-size:88px;font-weight:600;line-height:1.02;letter-spacing:-0.02em;max-width:18ch;\">Right tool for the right job.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:48px;max-width:52ch;line-height:1.3;\"><span style=\"color:var(--clay);font-family:'JetBrains Mono',monospace;font-size:var(--small);\">PROBLEM&nbsp;→&nbsp;<\u002Fspan>One do-everything agent means context pollution, wrong tools available, and every agent able to modify any file.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">11<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Agent roster\" data-screen-label=\"Agent roster\" data-speaker-notes=\"The fix: purpose-built agents, each with scoped tool access, permission boundaries, focused prompts, and safety hooks. Walk the roster — note that reviewers and auditors structurally cannot write. The developer builds; the reviewers critique; nobody has the other's permissions.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">III · Agents · the fix<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:26ch;margin-bottom:44px;\">Scoped tools, scoped writes, focused prompts<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:0;max-width:1680px;font-family:'JetBrains Mono',monospace;\">\n      <div style=\"display:grid;grid-template-columns:300px 1fr 300px;gap:36px;padding:14px 0;border-bottom:1px solid var(--line-ink);font-size:15px;letter-spacing:0.1em;color:var(--muted-ink);\"><span>AGENT<\u002Fspan><span>PURPOSE<\u002Fspan><span>KEY CONSTRAINT<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 300px;gap:36px;padding:17px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:21px;\">feature-developer<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;\">Build features with workflow gates<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--muted-ink);\">Write scoped to powerpipe/**<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 300px;gap:36px;padding:17px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:21px;\">code-reviewer<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;\">Pre-MR code review<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--muted-ink);\">denyByDefault — diff/log only<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 300px;gap:36px;padding:17px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:21px;\">security-auditor<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;\">Security review of changes<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--muted-ink);\">No write. Hands off fixes.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 300px;gap:36px;padding:17px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:21px;\">gitlab-ci-engineer<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;\">CI/CD pipeline work<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--muted-ink);\">Focused on .gitlab-ci.yml<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 300px;gap:36px;padding:17px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:21px;\">jira-agent<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;\">Ticket management<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--muted-ink);\">Hook blocks all deletes<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 300px;gap:36px;padding:17px 0;align-items:baseline;\"><span style=\"color:var(--clay);font-size:21px;\">aws-architect<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;\">Architecture design<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--muted-ink);\">Read-only. Docs, not code.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">12<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Agent composition\" data-screen-label=\"Agent composition\" data-speaker-notes=\"How agents compose. The feature-developer implements with write access, then delegates review to code-reviewer via the subagent tool — read-only, focused critique. If review passes, it commits and pushes. This mirrors a real team: developer writes, reviewer reviews, neither has the other's permissions.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">III · Agents · composition<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:24ch;margin-bottom:16px;\">A team, encoded in permissions<\u002Fh2>\n    <p style=\"font-size:var(--small);color:var(--muted-ink);margin-bottom:56px;\">The developer writes, delegates to the reviewer, then proceeds only if review passes.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 88px 1fr;align-items:center;max-width:1540px;\">\n      <div style=\"padding:40px 44px;border:1px solid var(--clay);border-radius:8px;background:#fff;min-height:280px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--small);color:var(--clay);letter-spacing:0.12em;margin-bottom:22px;\">feature-developer<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.36;margin-bottom:18px;\">Implements the feature — write access to <span style=\"font-family:'JetBrains Mono',monospace;font-size:19px;\">powerpipe/**<\u002Fspan>.<\u002Fp>\n        <p style=\"font-size:20px;line-height:1.36;color:var(--muted-ink);\">Has the <span style=\"font-family:'JetBrains Mono',monospace;font-size:17px;\">subagent<\u002Fspan> tool → can delegate.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted-ink);font-family:'JetBrains Mono',monospace;font-size:14px;\"><span style=\"font-size:30px;\">→<\u002Fspan><span>delegate<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:40px 44px;border:1px solid var(--line-ink);border-radius:8px;background:var(--paper2);min-height:280px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--small);color:var(--sage);letter-spacing:0.12em;margin-bottom:22px;\">code-reviewer<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.36;margin-bottom:18px;\">Read-only, focused critique. Can only run <span style=\"font-family:'JetBrains Mono',monospace;font-size:19px;\">git diff<\u002Fspan>.<\u002Fp>\n        <p style=\"font-size:20px;line-height:1.36;color:var(--muted-ink);\">Verdict: LGTM / CHANGES REQUESTED.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:23px;color:var(--ink);margin-top:38px;max-width:70ch;line-height:1.4;\">No accidental CI edits from the dashboard agent. Security reviews are <span style=\"color:var(--clay);\">structurally unable to “fix it themselves.”<\u002Fspan><\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">13<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"IV · Hooks — divider\" data-screen-label=\"Hooks\" data-speaker-notes=\"Section IV. Even with clear steering rules, mistakes happen: an accidental push to main, a force-push that loses history, a deleted Jira ticket, a write AWS call from a read-only context. One wrong command costs hours. Hooks are deterministic guardrails.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">IV · Hooks<\u002Fdiv>\n    <h2 style=\"font-size:88px;font-weight:600;line-height:1.02;letter-spacing:-0.02em;max-width:18ch;\">Automated safety guardrails.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:48px;max-width:52ch;line-height:1.3;\"><span style=\"color:var(--clay);font-family:'JetBrains Mono',monospace;font-size:var(--small);\">PROBLEM&nbsp;→&nbsp;<\u002Fspan>Rules ask nicely. But an accidental <span style=\"font-family:'JetBrains Mono',monospace;font-size:30px;\">push origin main<\u002Fspan> or a force-push still costs hours to recover.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">14<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Hook block [anim]\" data-screen-label=\"Hook self-correct\" data-speaker-notes=\"The fix: Python scripts that intercept tool calls before they execute. They read the invocation as JSON, check it against safety rules, and exit 2 to block with an explanation. Walk the animation: the agent tries to push to main, the git-safety-guard blocks it and returns why, and the agent self-corrects to the feature branch. We run three guards — git, AWS read-only, and Jira no-delete.\" style=\"background:var(--ink);color:var(--cream);display:flex;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding-right:48px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">IV · Hooks · the fix<\u002Fdiv>\n      <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.05;letter-spacing:-0.015em;max-width:15ch;margin-bottom:32px;\">Blocked before it runs<\u002Fh2>\n      <p style=\"font-size:var(--body);line-height:1.34;color:var(--muted-cream);max-width:30ch;margin-bottom:28px;\">Python intercepts every tool call. Exit&nbsp;2 blocks it and hands the reason back — the agent reads it and self-corrects.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:12px;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--muted-cream);\">\n        <div><span style=\"color:var(--clay);\">·<\u002Fspan> git-safety-guard.py<\u002Fdiv>\n        <div><span style=\"color:var(--clay);\">·<\u002Fspan> aws-readonly-guard.py<\u002Fdiv>\n        <div><span style=\"color:var(--clay);\">·<\u002Fspan> jira-no-delete-guard.py<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:760px;display:flex;flex-direction:column;justify-content:center;gap:20px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:19px;color:var(--muted-cream);\">agent<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;padding:20px 26px;border:1px solid var(--line-cream);border-radius:8px;background:var(--ink2);color:var(--cream);animation:blockShake 6s ease-in-out infinite;\">$ git push origin main\n        <span style=\"display:block;margin-top:14px;color:var(--clay);font-size:17px;animation:blockLabel 6s ease-in-out infinite;\">🚫 BLOCKED — push to main. Use a feature branch + MR.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--muted-cream);text-align:center;letter-spacing:0.1em;animation:blockLabel 6s ease-in-out infinite;\">↓ self-corrects<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;padding:20px 26px;border:1px solid var(--sage);border-radius:8px;background:var(--ink2);color:var(--cream);animation:stampIn 6s ease-in-out infinite;\">$ git push -u origin feature/CHR-12345-…\n        <span style=\"display:block;margin-top:14px;color:var(--sage);font-size:17px;\">✓ allowed<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">15<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"V · Permissions\" data-screen-label=\"Permissions &amp; trust\" data-speaker-notes=\"Section V. Two extremes are both bad: too much prompting grinds the workflow to a halt; too much trust auto-approves destructive operations. The fix is a layered trust gradient — auto-approve safe operations, gate dangerous ones. Result: 80 percent fewer approval prompts, and dangerous operations are structurally impossible rather than discouraged.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">V · Permissions &amp; trust<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:26ch;margin-bottom:16px;\">Less friction, without less safety<\u002Fh2>\n    <p style=\"font-size:var(--small);color:var(--muted-ink);margin-bottom:48px;\">Auto-approve what's safe, gate what's dangerous, block what's destructive.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:14px;max-width:1600px;\">\n      <div style=\"display:grid;grid-template-columns:34px 1fr;gap:24px;align-items:center;padding:16px 26px;border-radius:6px;background:#fff;border:1px solid var(--line-ink);\"><span style=\"color:var(--sage);font-size:24px;\">✓<\u002Fspan><span style=\"font-size:25px;\">Read files, search code, <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;\">powerpipe dashboard list<\u002Fspan> — instant, no prompt.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:34px 1fr;gap:24px;align-items:center;padding:16px 26px;border-radius:6px;background:#fff;border:1px solid var(--line-ink);\"><span style=\"color:var(--sage);font-size:24px;\">✓<\u002Fspan><span style=\"font-size:25px;\">Write a new <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;\">.pp<\u002Fspan> file — auto-approved, matches <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;\">allowedPaths<\u002Fspan>.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:34px 1fr;gap:24px;align-items:center;padding:16px 26px;border-radius:6px;background:#fff;border:1px solid var(--line-ink);\"><span style=\"color:#C9A227;font-size:24px;\">⚠<\u002Fspan><span style=\"font-size:25px;\">Push to a feature branch — <span style=\"color:var(--muted-ink);\">prompts for approval.<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:34px 1fr;gap:24px;align-items:center;padding:16px 26px;border-radius:6px;background:var(--paper2);border:1px solid var(--clay);\"><span style=\"color:var(--clay);font-size:22px;\">🚫<\u002Fspan><span style=\"font-size:25px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;\">push origin main<\u002Fspan> blocked by hook · <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;\">.gitlab-ci.yml<\u002Fspan> blocked by deniedPaths.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:24px;color:var(--sage);margin-top:38px;font-weight:500;\">80% fewer approval prompts during normal development.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">16<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"VI · Context\" data-screen-label=\"Context management\" data-speaker-notes=\"Section VI. Context windows are finite. Loading everything wastes tokens and confuses the model; loading too little starves it. Our fix is two loading strategies: steering is always loaded for rules that apply everywhere; skills load on demand for domain knowledge needed only for specific tasks. A dashboard session loads steering plus the powerpipe skill; a Terraform session swaps in the terraform skill. No wasted context.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">VI · Context management<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:24ch;margin-bottom:48px;\">Two strategies for two kinds of knowledge<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:50px;max-width:1580px;\">\n      <div style=\"padding:44px 46px;border:1px solid var(--line-cream);border-radius:8px;background:var(--ink2);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;color:var(--clay);margin-bottom:20px;\">file:// — steering<\u002Fdiv>\n        <h3 style=\"font-size:30px;font-weight:600;margin-bottom:16px;\">Always loaded<\u002Fh3>\n        <p style=\"font-size:24px;line-height:1.36;color:var(--muted-cream);\">Rules for <em>every<\u002Fem> interaction — branch conventions, security, the verification step. Injected at session start.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:44px 46px;border:1px solid var(--line-cream);border-radius:8px;background:var(--ink2);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;color:var(--clay);margin-bottom:20px;\">skill:// — skills<\u002Fdiv>\n        <h3 style=\"font-size:30px;font-weight:600;margin-bottom:16px;\">Loaded on demand<\u002Fh3>\n        <p style=\"font-size:24px;line-height:1.36;color:var(--muted-cream);\">Only name + description at first. Full content loads when the task triggers it — HCL syntax, FinOps formulas.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:23px;color:var(--muted-cream);margin-top:38px;max-width:76ch;line-height:1.4;\">A dashboard session loads ~230 lines of steering + the powerpipe skill. A Terraform session swaps in the terraform skill instead. <span style=\"color:var(--cream);\">Context budget spent on the current task.<\u002Fspan><\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">17<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"VII · Workflow — divider\" data-screen-label=\"Workflow automation\" data-speaker-notes=\"Section VII. The feature lifecycle has eight-plus steps, each with room for error: forgetting the Jira ticket, wrong branch naming, skipping verification, pushing untested code. Doing it by hand means missed steps. We automated the whole flow.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">VII · Workflow automation<\u002Fdiv>\n    <h2 style=\"font-size:80px;font-weight:600;line-height:1.03;letter-spacing:-0.02em;max-width:20ch;\">From idea to a deployed dashboard.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:44px;max-width:52ch;line-height:1.3;\"><span style=\"color:var(--clay);font-family:'JetBrains Mono',monospace;font-size:var(--small);\">PROBLEM&nbsp;→&nbsp;<\u002Fspan>An 8-step lifecycle done by hand means forgotten tickets, wrong branch names, and skipped verification.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">18<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Workflow + gates\" data-screen-label=\"Workflow gates\" data-speaker-notes=\"The fix combines a prompt template (@feature-workflow) that orchestrates the sequence with the feature-developer agent that has the tools, permissions, and hooks to run it safely. Every irreversible action pauses for explicit human approval — plan, Jira, branch, review, push, MR. No forgotten steps.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">VII · the fix · human gates<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:26ch;margin-bottom:16px;\">Automated flow, human gates<\u002Fh2>\n    <p style=\"font-size:var(--small);color:var(--muted-ink);margin-bottom:48px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:21px;color:var(--clay);\">@feature-workflow<\u002Fspan> orchestrates; every irreversible action pauses for approval.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:16px;max-width:1680px;\">\n      <div style=\"border-top:2px solid var(--sage);padding-top:20px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--sage);letter-spacing:0.08em;margin-bottom:12px;\">🔒 PLAN<\u002Fdiv><p style=\"font-size:19px;line-height:1.3;\">Files + outcome<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:20px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--clay);letter-spacing:0.08em;margin-bottom:12px;\">🔒 JIRA<\u002Fdiv><p style=\"font-size:19px;line-height:1.3;\">Ticket fields<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:20px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--clay);letter-spacing:0.08em;margin-bottom:12px;\">🔒 BRANCH<\u002Fdiv><p style=\"font-size:19px;line-height:1.3;\">Branch name<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:20px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--clay);letter-spacing:0.08em;margin-bottom:12px;\">🔒 DIFF<\u002Fdiv><p style=\"font-size:19px;line-height:1.3;\">git diff summary<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:20px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--clay);letter-spacing:0.08em;margin-bottom:12px;\">🔒 REVIEW<\u002Fdiv><p style=\"font-size:19px;line-height:1.3;\">code-reviewer<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:20px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--clay);letter-spacing:0.08em;margin-bottom:12px;\">🔒 PUSH<\u002Fdiv><p style=\"font-size:19px;line-height:1.3;\">Commit + files<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line-ink);padding-top:20px;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--clay);letter-spacing:0.08em;margin-bottom:12px;\">🔒 MR<\u002Fdiv><p style=\"font-size:19px;line-height:1.3;\">Title + desc<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:23px;color:var(--ink);margin-top:44px;max-width:76ch;line-height:1.4;\">Consistent execution every time. No forgotten Jira, verification, or review — and the hooks still catch the three most dangerous mistakes underneath.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">19<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Deploy pipeline [anim]\" data-screen-label=\"Merge = deploy\" data-speaker-notes=\"After MR merge, the pipeline takes over with zero manual steps: publish-mod syncs powerpipe/ to the S3 mod bucket, trigger-refresh kicks powerpipe-deploy with REFRESH_DATA true, kubectl rollout restart runs, the pod pulls the new dashboard from S3, and it goes live in the browser. Merge equals deploy — no manual kubectl.\" style=\"background:var(--ink);color:var(--cream);display:flex;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding-right:48px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">VII · after merge<\u002Fdiv>\n      <h2 style=\"font-size:76px;font-weight:600;line-height:1.02;letter-spacing:-0.02em;max-width:12ch;margin-bottom:30px;\">Merge = deploy.<\u002Fh2>\n      <p style=\"font-size:var(--body);line-height:1.34;color:var(--muted-cream);max-width:30ch;\">The pipeline handles it end to end. Zero manual <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;\">kubectl<\u002Fspan> — the dashboard is live in minutes.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"width:660px;display:flex;align-items:center;justify-content:center;position:relative;\">\n      <svg viewBox=\"0 0 120 620\" style=\"position:absolute;left:38px;top:20px;height:580px;width:120px;pointer-events:none;\">\n        <line x1=\"12\" y1=\"10\" x2=\"12\" y2=\"610\" stroke=\"rgba(242,236,224,0.2)\" stroke-width=\"2\"><\u002Fline>\n        <line x1=\"12\" y1=\"10\" x2=\"12\" y2=\"610\" stroke=\"#C05F38\" stroke-width=\"2\" stroke-dasharray=\"8 24\" style=\"animation:dashFlow 1.4s linear infinite;\"><\u002Fline>\n      <\u002Fsvg>\n      <div style=\"display:flex;flex-direction:column;gap:26px;width:520px;padding-left:70px;\">\n        <div style=\"padding:20px 26px;border:2px solid var(--clay);border-radius:8px;background:var(--ink2);\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;color:var(--clay);\">MR merged to main<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:18px 26px;border:1px solid var(--line-cream);border-radius:8px;background:var(--ink2);\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--cream);\">publish-mod<\u002Fdiv><div style=\"font-size:18px;color:var(--muted-cream);margin-top:6px;\">syncs powerpipe/ → S3 mod bucket<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:18px 26px;border:1px solid var(--line-cream);border-radius:8px;background:var(--ink2);\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--cream);\">trigger-refresh<\u002Fdiv><div style=\"font-size:18px;color:var(--muted-cream);margin-top:6px;\">REFRESH_DATA=true → powerpipe-deploy<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:18px 26px;border:1px solid var(--line-cream);border-radius:8px;background:var(--ink2);\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--cream);\">kubectl rollout restart<\u002Fdiv><div style=\"font-size:18px;color:var(--muted-cream);margin-top:6px;\">pod pulls new dashboard from S3<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:20px 26px;border:2px solid var(--sage);border-radius:8px;background:var(--ink2);animation:gateGlow 3s ease-in-out infinite;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;color:var(--sage);\">✓ live in browser<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">20<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"VIII · Demo — divider\" data-screen-label=\"Live demo\" data-speaker-notes=\"Section VIII. Now put it all together in one live demo: adding a Resource Count Summary dashboard — cards for totals, a per-account table, a per-environment table. Two new files, walked through the full guided workflow.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">VIII · Live demo<\u002Fdiv>\n    <h2 style=\"font-size:80px;font-weight:600;line-height:1.02;letter-spacing:-0.02em;max-width:20ch;\">Everything, in one feature.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:44px;max-width:50ch;line-height:1.3;\">Adding a Resource Count Summary dashboard — total cards, a per-account table, and a per-environment table.<\u002Fp>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">21<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Demo in action\" data-screen-label=\"Demo in action\" data-speaker-notes=\"Walk the flow live. Enter feature-developer with ctrl+shift+f — the agentSpawn hook shows current branch. Invoke @feature-workflow. It researches existing patterns, presents a plan, creates the Jira ticket and branch, implements the two files, runs powerpipe dashboard list (exits 0), gets a code-reviewer LGTM, commits and pushes, opens the MR, updates Jira. Merge triggers the pipeline and the dashboard appears in production.\" style=\"background:var(--paper);color:var(--ink);display:flex;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding-right:48px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">VIII · the flow<\u002Fdiv>\n      <h2 style=\"font-size:52px;font-weight:600;line-height:1.05;letter-spacing:-0.015em;max-width:16ch;margin-bottom:30px;\">resource_count_summary<\u002Fh2>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:19px;color:var(--muted-ink);line-height:1.7;\">\n        <div>dashboards/resource_count_summary.pp<\u002Fdiv>\n        <div>queries/resource_count_summary.pp<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:22px;color:var(--ink);margin-top:30px;max-width:30ch;line-height:1.4;\">Two new files. Zero existing files modified. One guided flow.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"width:800px;display:flex;align-items:center;\">\n      <div style=\"width:100%;background:var(--ink);border-radius:10px;overflow:hidden;box-shadow:0 24px 60px rgba(27,24,19,0.22);\">\n        <div style=\"display:flex;align-items:center;gap:9px;padding:16px 22px;border-bottom:1px solid var(--line-cream);\">\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#E06C5A;\"><\u002Fspan>\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#E3B341;\"><\u002Fspan>\n          <span style=\"width:12px;height:12px;border-radius:50%;background:#7E9A66;\"><\u002Fspan>\n          <span style=\"margin-left:14px;font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--muted-cream);\">feature-developer · ctrl+shift+f<\u002Fspan>\n        <\u002Fdiv>\n        <pre style=\"margin:0;padding:26px 30px;font-family:'JetBrains Mono',monospace;font-size:16px;line-height:1.72;color:var(--cream);white-space:pre-wrap;\"><span style=\"color:var(--sage);\">◇<\u002Fspan> Branch: main · clean\n<span style=\"color:var(--sage);\">◇<\u002Fspan> @feature-workflow\n  research → plan          <span style=\"color:var(--clay);\">🔒<\u002Fspan>\n  Jira CHR-XXXXX           <span style=\"color:var(--clay);\">🔒<\u002Fspan>\n  branch feature/…-summary <span style=\"color:var(--clay);\">🔒<\u002Fspan>\n  implement 2 files\n  powerpipe dashboard list <span style=\"color:var(--sage);\">✓ exit 0<\u002Fspan>\n  code-reviewer            <span style=\"color:var(--sage);\">LGTM<\u002Fspan>\n  commit → push            <span style=\"color:var(--clay);\">🔒<\u002Fspan>\n  glab mr create           <span style=\"color:var(--clay);\">🔒<\u002Fspan>\n<span style=\"color:var(--sage);\">◇<\u002Fspan> merged → pipeline → <span style=\"color:var(--sage);\">live<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">22<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"What the demo shows\" data-screen-label=\"What the demo shows\" data-speaker-notes=\"Tie every feature back to where it's visible in the demo. Steering gives branch naming and the verification step; skills give correct HCL; agents split writing from reviewing; hooks block pushes to main; permissions scope writes; context loads steering always and powerpipe on demand; the workflow runs 8 steps with gates; automation deploys on merge. This is the whole deck in one slide.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">VIII · what it shows<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:24ch;margin-bottom:44px;\">Every piece, visible at once<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 80px;max-width:1620px;font-family:'JetBrains Mono',monospace;\">\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Steering<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">branch naming, verify step<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Permissions<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">write scoped to powerpipe/**<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Skills<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">correct HCL: 12-col grid, CTE<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Context<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">steering always, skill on demand<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Agents<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">developer writes, reviewer reviews<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Workflow<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">8 steps, human gates, no misses<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Hooks<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">git-safety-guard blocks main<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:190px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"color:var(--clay);font-size:20px;\">Automation<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-size:21px;\">MR merge → S3 → pod → live<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">23<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Before / after\" data-screen-label=\"Before / after\" data-speaker-notes=\"The summary table, reframed away from 'one-man team'. Each row is a problem we had before kiro and how a building block fixed it. Read a few aloud — the pattern is consistent: knowledge that used to live in our heads now lives in the configuration.\" style=\"background:var(--paper);color:var(--ink);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:26px;\">The shift<\u002Fdiv>\n    <h2 style=\"font-size:var(--title);font-weight:600;line-height:1.04;letter-spacing:-0.015em;max-width:24ch;margin-bottom:40px;\">Before kiro → after kiro<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:0;max-width:1680px;\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:13px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"font-size:23px;color:var(--muted-ink);\">Forgot conventions between sessions<\u002Fspan><span style=\"font-size:23px;\"><span style=\"color:var(--sage);\">→<\u002Fspan> Steering enforces them automatically<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:13px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"font-size:23px;color:var(--muted-ink);\">Hallucinated Powerpipe syntax<\u002Fspan><span style=\"font-size:23px;\"><span style=\"color:var(--sage);\">→<\u002Fspan> Skills provide verified patterns<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:13px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"font-size:23px;color:var(--muted-ink);\">One agent trying to do everything<\u002Fspan><span style=\"font-size:23px;\"><span style=\"color:var(--sage);\">→<\u002Fspan> Specialised agents with scoped access<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:13px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"font-size:23px;color:var(--muted-ink);\">Accidental destructive operations<\u002Fspan><span style=\"font-size:23px;\"><span style=\"color:var(--sage);\">→<\u002Fspan> Hooks block them before execution<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:13px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"font-size:23px;color:var(--muted-ink);\">Constant approval prompts<\u002Fspan><span style=\"font-size:23px;\"><span style=\"color:var(--sage);\">→<\u002Fspan> Trust layers auto-approve safe ops<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:13px 0;border-bottom:1px solid var(--line-ink);align-items:baseline;\"><span style=\"font-size:23px;color:var(--muted-ink);\">8-step process with missed steps<\u002Fspan><span style=\"font-size:23px;\"><span style=\"color:var(--sage);\">→<\u002Fspan> Automated flow with human gates<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:13px 0;align-items:baseline;\"><span style=\"font-size:23px;color:var(--muted-ink);\">Manual deployment after merge<\u002Fspan><span style=\"font-size:23px;\"><span style=\"color:var(--sage);\">→<\u002Fspan> Pipeline auto-deploys in minutes<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-ink);letter-spacing:0.14em;\">24<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Close\" data-screen-label=\"Close\" data-speaker-notes=\"Close on the reframed bottom line. Four repos, nine accounts, six dashboards, a full CI/CD pipeline — delivered and maintained with kiro-cli as our development partner. It doesn't replace our judgment; it handles the mechanical parts so we spend our attention on the design decisions.\" style=\"background:var(--ink);color:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad-top) var(--pad-x) var(--pad-bottom);position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--kicker);letter-spacing:0.24em;text-transform:uppercase;color:var(--clay);margin-bottom:36px;\">The bottom line<\u002Fdiv>\n    <h2 style=\"font-size:72px;font-weight:600;line-height:1.04;letter-spacing:-0.02em;max-width:22ch;\">A partner that amplifies our capacity.<\u002Fh2>\n    <p style=\"font-size:var(--subtitle);color:var(--muted-cream);margin-top:40px;max-width:50ch;line-height:1.32;\">4 repos · 9 accounts · 6 dashboards · full CI/CD — delivered and maintained with kiro-cli handling the mechanical parts while we focus on the decisions.<\u002Fp>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:var(--body);color:var(--cream);margin-top:60px;display:flex;align-items:center;gap:2px;\">\n      <span style=\"color:var(--sage);\">$<\u002Fspan>&nbsp;kiro<span style=\"display:inline-block;width:16px;height:34px;background:var(--clay);margin-left:10px;animation:caretBlink 1.1s step-end infinite;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:absolute;right:var(--pad-x);bottom:56px;font-family:'JetBrains Mono',monospace;font-size:var(--kicker);color:var(--muted-cream);letter-spacing:0.14em;\">25<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
